---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Packer Lint

on:
  push:
    paths:
      - '**.hcl'
      - .github/workflows/packer-lint.yml
  pull_request:
  workflow_dispatch:

permissions: {}

concurrency:
  group: packer-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  packer-lint:
    name: Lint packer Playbooks
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup packer
        uses: hashicorp/setup-packer@3286471d6cc6756d056a0b199fea5e0becdbc189 # v3.3.0
        id: setup
        with:
          version: latest

      - name: Run packer validate
        id: validate
        run: |
          find . -name "*.pkr.hcl" -exec packer validate -syntax-only {} \;
