---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Packer Lint

on:
  push:
    paths:
      - '**.hcl'
      - .github/workflows/packer-lint.yml
  pull_request:
  workflow_dispatch:

permissions: {}

concurrency:
  group: packer-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  packer-lint:
    name: Lint packer Playbooks
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup packer
        uses: hashicorp/setup-packer@ce93c3c08a6c2ff2275bf4b54ff0d9a75f6c9789 # v3.4.0
        id: setup
        with:
          version: latest

      - name: Run packer validate
        id: validate
        run: |
          find . -name "*.pkr.hcl" -exec packer validate -syntax-only {} \;
